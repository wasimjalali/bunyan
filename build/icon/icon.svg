<svg width="1024" height="1024" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Bunyan app icon: one rounded 3D tile holding a single glyph, crescent / crescent.
    The two angle brackets of the old </> code glyph are replaced by gold crescent
    moons cradling a gold slash (each moon opening toward it), fusing the brand
    crescent into the code slash. Hero variant: a deep-navy tile with the gold glyph.
    Each crescent is an outer disc minus an offset cut disc (a mask), which gives the
    moon its cusps. The glyph is scaled to 0.74 around the centre for even padding.
    Matches src/renderer/app/BunyanMark.tsx (theme="light" treatment). The macOS
    .icns set is generated from this SVG.
  -->
  <defs>
    <linearGradient id="navy" x1="0" y1="2" x2="0" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#244873" />
      <stop offset="0.5" stop-color="#16304D" />
      <stop offset="1" stop-color="#0C1929" />
    </linearGradient>
    <linearGradient id="navySheen" x1="0" y1="2" x2="0" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="gold" x1="10" y1="14" x2="52" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4CE" />
      <stop offset="0.4" stop-color="#EBC061" />
      <stop offset="0.75" stop-color="#C7972F" />
      <stop offset="1" stop-color="#946417" />
    </linearGradient>

    <filter id="tileDrop" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="2.2" stdDeviation="2" flood-color="#000000" flood-opacity="0.38" />
    </filter>

    <!-- Left moon "(": outer disc minus a disc offset to the right. -->
    <mask id="cl" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="64" height="64" fill="black" />
      <circle cx="19" cy="32" r="13.5" fill="white" />
      <circle cx="24.6" cy="32" r="12.4" fill="black" />
    </mask>
    <!-- Right moon ")": outer disc minus a disc offset to the left. -->
    <mask id="cr" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="64" height="64" fill="black" />
      <circle cx="45" cy="32" r="13.5" fill="white" />
      <circle cx="39.4" cy="32" r="12.4" fill="black" />
    </mask>
  </defs>

  <!-- Rounded navy tile: body, then a top sheen, inside a soft drop shadow -->
  <rect x="3" y="3" width="58" height="58" rx="14.5" fill="url(#navy)" filter="url(#tileDrop)" stroke="#0C1F37" stroke-width="0.75" />
  <rect x="3" y="3" width="58" height="58" rx="14.5" fill="url(#navySheen)" />

  <!-- Glyph scaled to 0.74 around the tile centre for even padding on every edge -->
  <g transform="translate(32 32) scale(0.74) translate(-32 -32)">
    <circle cx="19" cy="32" r="13.5" fill="url(#gold)" mask="url(#cl)" />
    <circle cx="45" cy="32" r="13.5" fill="url(#gold)" mask="url(#cr)" />
    <path d="M27.6 45 L36.4 19" stroke="url(#gold)" stroke-width="3.7" stroke-linecap="round" fill="none" />
  </g>
</svg>
